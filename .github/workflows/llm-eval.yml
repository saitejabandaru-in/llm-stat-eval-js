name: LLM Statistical Evaluation

on:
  pull_request:
    branches: [ main ]

jobs:
  evaluate-prompts:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-level: '20'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Run Model Evaluations
      # This step would execute your custom prompt evaluation script,
      # which calls your prompt pipeline and saves scores for both model versions (main vs branch)
      # into `eval_scores.json`.
      run: node scripts/run_evals.js
      
    - name: Execute Rigorous Statistical Check
      # Run the llm-stat-eval CLI to determine if the branch changes
      # are statistically significantly worse than main baselines.
      # If the global p-value indicates degradation (under your config threshold),
      # the CLI will fail and prevent the PR merge.
      run: npx @saitejabandaru-in/llm-stat-eval --config eval_scores.json --output report.html
      
    - name: Upload HTML Report Dashboard
      uses: actions/upload-artifact@v3
      with:
        name: llm-stat-eval-report
        path: report.html
